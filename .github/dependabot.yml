version: 2
updates:
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
    ignore:
      - dependency-name: golang.org/x/crypto         # replaced by x-crypto fork
      - dependency-name: github.com/Justype/x-crypto # managed by sync-upstream workflow
    groups:
      dependencies:
        patterns: ["*"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]
